<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TIED - Collective Clothing Brand">
    <title>TIED COLLECTIVE</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Stardos+Stencil:wght@400;700&family=Allerta+Stencil&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-content">
            <div class="canvas-wrapper">
                <canvas id="preloader-canvas"></canvas>
            </div>
            <div class="preloader-status">
                <span class="typing-text">CONNECTING TO COLLECTIVE...</span>
            </div>
        </div>
    </div>

    <!-- Site Header Container -->
    <header class="site-header">
        <div class="announcement-bar">
            <span>TIED COLLECTIVE // COLLECTION 01 DROPPING SOON</span>
        </div>
        <nav class="navbar">
            <div class="nav-left">
                <a href="#latest-drops" class="nav-link">NEW RELEASES</a>
                <a href="https://instagram.com/tied" target="_blank" rel="noopener noreferrer" class="nav-link">INSTAGRAM</a>
            </div>
            <div class="nav-center">
                <a href="#">
                    <img src="assets/images/logo.png" alt="TIED Logo" class="nav-logo">
                </a>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link cart-trigger">BAG (0)</a>
            </div>
        </nav>
    </header>

    <header class="hero">
        <div class="hero-bg" style="background-image: url('assets/images/hero.png');"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content fade-in-up">
            <h1 class="hero-title">COLLECTION 01</h1>
            <div class="countdown">
                <span id="timer">24:00:00</span>
                <p>UNTIL DROP</p>
            </div>
            <div class="hero-signup">
                <p class="hero-signup-prompt">ENTER EMAIL FOR EARLY ACCESS TO THE DROP</p>
                <form class="coming-soon-form">
                    <input type="email" placeholder="EMAIL ADDRESS" required>
                    <button type="submit">SUBMIT</button>
                </form>
                <div class="form-success-msg">
                    <span class="success-text">[ ACCESS GRANTED ]</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Floating Widgets -->
    <div class="floating-discount" id="discount-pill">
        <button class="discount-close" aria-label="Close discount">&times;</button>
        <div class="discount-trigger-text">GET $5 OFF</div>
        <form class="discount-form">
            <input type="email" placeholder="EMAIL ADDRESS" required>
            <button type="submit">→</button>
        </form>
    </div>



    <script src="js/main.js"></script>
</body>
</html>
